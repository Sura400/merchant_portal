<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Gadaa Bank{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <h2 class="brand-name">
      <img src="{{ url_for('static', filename='gadaa_logo.png') }}" alt="Logo" style="height:40px; margin-bottom:10px;">
      Gadaa Bank
    </h2>
    <ul class="menu">
      <li><a href="{{ url_for('home') }}"><i class="fa fa-home"></i> Home</a></li>
      <li><a href="{{ url_for('merchant_register') }}"><i class="fa fa-user-plus"></i> Merchant Register</a></li>
      <li><a href="{{ url_for('merchant_list') }}"><i class="fa fa-list"></i> Merchant List</a></li>
      <li><a href="{{ url_for('generate_qr') }}"><i class="fa fa-qrcode"></i> Generate QR</a></li>
      <li><a href="{{ url_for('merchant_reports') }}"><i class="fa fa-chart-line"></i> Reports</a></li>
      <li><a href="{{ url_for('support') }}"><i class="fa fa-headset"></i> Support</a></li>
      <li><a href="{{ url_for('logout') }}"><i class="fa fa-sign-out-alt"></i> Logout</a></li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
