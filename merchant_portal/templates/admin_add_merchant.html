{% extends "base.html" %}
{% block content %}
  <h2>Add Merchant</h2>
  <form method="POST" enctype="multipart/form-data" class="gadaa-form">
    <label>Business Name:</label><input type="text" name="business_name"><br>
    <label>Address:</label><input type="text" name="address"><br>
    <label>Contact:</label><input type="text" name="contact"><br>
    <label>Email:</label><input type="email" name="email"><br>
    <label>Account Number:</label><input type="text" name="account_number"><br>
    <label>Upload License:</label><input type="file" name="license"><br>
    <label>Expiry Date:</label><input type="date" name="expiry_date"><br>
    <button type="submit" class="btn">Save</button>
  </form>
{% endblock %}
