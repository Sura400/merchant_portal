{% extends "base.html" %}
{% block title %}Generate QR - Gadaa Bank{% endblock %}
{% block content %}
  <div class="welcome-banner">
    <h1>Generate ETSwitch QR</h1>
    <p>Enter Merchant ID and generate branded QR code.</p>
  </div>

  <form method="POST">
    <label for="merchant_id">Merchant ID:</label>
    <input type="text" name="merchant_id" value="{{ current_role }}" required>
    <button type="submit">Generate QR</button>
  </form>

  {% if qr_file %}
    <div class="card">
      <h3>QR Preview</h3>
      <img src="{{ url_for('uploaded_file', filename=qr_file) }}" alt="QR Code" style="max-width:300px;">
      <p><a href="{{ url_for('uploaded_file', filename=qr_file) }}" download>Download QR</a></p>
    </div>
  {% endif %}
{% endblock %}
